name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run Tests
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m pytest -q

      - name: Build Windows EXE
        run: pyinstaller packaging/windows/CodexSubMcpManager.spec --noconfirm

      - name: Generate Checksums
        shell: pwsh
        run: |
          $hash = Get-FileHash dist/CodexSubMcpManager.exe -Algorithm SHA256
          "$($hash.Hash)  CodexSubMcpManager.exe" | Set-Content dist/checksums.txt

      - name: Upload Release Assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $assets = @(
            "dist/CodexSubMcpManager.exe",
            "dist/checksums.txt"
          )

          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assets --clobber
          } else {
            gh release create $env:TAG_NAME $assets --title $env:TAG_NAME
          }
