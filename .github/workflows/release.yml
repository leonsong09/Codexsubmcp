name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run Tests
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -m pytest -q

      - name: Build Windows EXE
        run: pyinstaller packaging/windows/CodexSubMcpManager.spec --noconfirm

      - name: Generate Checksums
        shell: pwsh
        run: |
          $hash = Get-FileHash dist/CodexSubMcpManager.exe -Algorithm SHA256
          "$($hash.Hash)  CodexSubMcpManager.exe" | Set-Content dist/checksums.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CodexSubMcpManager.exe
            dist/checksums.txt
